# Goat configuration. Copy to ~/.goat/config.toml and edit.
[goat]
provider  = "auto"      # auto | openai | anthropic | ollama
model     = ""          # empty -> provider default
api_key   = ""          # or use env GOAT_API_KEY / ANTHROPIC_API_KEY
base_url  = ""          # custom OpenAI-compatible endpoint
temperature = 0.2
max_tokens  = 2048
max_tool_rounds = 32
cwd = "."
autostart = true
verbose = false

# Telegram bot (optional). Get a token from @BotFather.
telegram_token = ""        # or set env GOAT_TELEGRAM_TOKEN
telegram_allowed = ""      # comma-separated chat/user ids; empty = allow all
