<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unified AI Agent</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Unified AI Agent</h1>
    <p class="sub">Cross-platform • offline-capable • weak-device friendly</p>

    <section id="health" class="card">
      <h2>Status</h2>
      <pre id="health-out">checking…</pre>
    </section>

    <section class="card">
      <h2>Run a task</h2>
      <textarea id="task" rows="3" placeholder="e.g. list files in the current directory"></textarea>
      <button id="run">Run</button>
      <pre id="result">—</pre>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
