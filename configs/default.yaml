agent:
  name: Goat AI Agent
  max_steps: 12
  max_tool_rounds: 24
  temperature: 0.2
  max_tokens: 2048
  weak_device_mode: auto
  fallback_enabled: true
  safety_level: standard
  verbose: false

logging:
  level: INFO
  dir: data/logs
  format: text

paths:
  data_dir: data
  memory_dir: data/memory
  cache_dir: data/cache

runtime:
  weak_device_fallback: true
  disable_concurrency: false
  stream_responses: true
